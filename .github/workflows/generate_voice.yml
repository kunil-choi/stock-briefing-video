name: 🎙️ Generate Voice Dubbing

on:
  workflow_run:
    workflows: ["📝 Generate Broadcast Script"]
    types: [completed]
  workflow_dispatch:

jobs:
  voice:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 패키지 설치
        run: pip install requests

      - name: 📥 script artifact 다운로드
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: generate_script.yml
          name: generated-script-latest
          path: output/KO/scripts/
          if_no_artifact_found: fail
          workflow_conclusion: success

      - name: 🎙️ 더빙 생성
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: python pipeline/generate_voice.py

      - name: 💾 결과물 저장
        uses: actions/upload-artifact@v4
        with:
          name: generated-voice-latest
          path: output/KO/audio/
          retention-days: 30
