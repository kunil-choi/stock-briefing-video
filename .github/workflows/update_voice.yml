name: 🎤 Update Voice Clone

on:
  push:
    paths:
      - "voice_sample/**"
  workflow_dispatch:

jobs:
  update_voice:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 패키지 설치
        run: pip install requests PyNaCl

      - name: 🎤 Voice Clone 업데이트
        id: update_voice
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          python pipeline/update_voice_id.py

      - name: 🔐 GitHub Secret 업데이트
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          NEW_VOICE_ID=$(cat /tmp/new_voice_id.txt)
          echo "새 Voice ID: $NEW_VOICE_ID"

          PUB_KEY_RESP=$(curl -s \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/secrets/public-key")

          KEY_ID=$(echo "$PUB_KEY_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['key_id'])")
          PUB_KEY=$(echo "$PUB_KEY_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['key'])")

          ENCRYPTED=$(NEW_VOICE_ID="$NEW_VOICE_ID" PUB_KEY="$PUB_KEY" python3 -c "
import base64, os
from nacl import encoding, public

pub_key = public.PublicKey(base64.b64decode(os.environ['PUB_KEY']))
sealed = public.SealedBox(pub_key)
encrypted = sealed.encrypt(os.environ['NEW_VOICE_ID'].encode())
print(base64.b64encode(encrypted).decode())
")

          curl -s -X PUT \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/secrets/ELEVENLABS_VOICE_ID" \
            -d "{\"encrypted_value\":\"$ENCRYPTED\",\"key_id\":\"$KEY_ID\"}"

          echo "✅ ELEVENLABS_VOICE_ID Secret 업데이트 완료"
