name: 🎙️ Extract Voice from Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "유튜브 영상 URL"
        required: true
        default: "https://www.youtube.com/watch?v=9CiiXbSw49Q"

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 패키지 설치
        run: |
          pip install yt-dlp demucs pydub
          sudo apt-get install -y ffmpeg

      - name: 🍪 쿠키 파일 생성
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: 🎵 오디오 추출
        run: |
          mkdir -p output/voice
          yt-dlp -x --audio-format mp3 \
            --audio-quality 0 \
            --cookies cookies.txt \
            -o "output/voice/raw_audio.%(ext)s" \
            "${{ github.event.inputs.video_url }}"

      - name: 🎙️ 목소리 분리 (Demucs)
        run: |
          python -m demucs \
            --two-stems=vocals \
            -o output/voice \
            output/voice/raw_audio.mp3

      - name: 💾 결과물 저장
        uses: actions/upload-artifact@v4
        with:
          name: extracted-voice
          path: output/voice/
          retention-days: 7
