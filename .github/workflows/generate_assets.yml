name: 🖼️ Generate Assets

on:
  workflow_run:
    workflows: ["🎙️ Generate Voice Dubbing"]
    types: [completed]
  workflow_dispatch:

jobs:
  assets:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔤 한글 폰트 설치
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
          fc-cache -fv
          echo "── 설치된 한글 폰트 ──"
          fc-list :lang=ko | head -20

      - name: 📦 패키지 설치
        run: |
          pip install \
            requests \
            Pillow \
            pykrx \
            matplotlib \
            pandas \
            mplfinance \
            python-dotenv

      - name: 📥 script artifact 다운로드
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: generate_script.yml
          name: generated-script-latest
          path: output/KO/scripts/
          if_no_artifact_found: fail
          workflow_conclusion: success

      - name: 🖼️ 자료 화면 제작
        run: |
          python pipeline/generate_assets.py KO

      - name: 💾 결과물 저장
        uses: actions/upload-artifact@v4
        with:
          name: generated-assets-${{ github.run_number }}
          path: output/KO/frames/
          retention-days: 30
